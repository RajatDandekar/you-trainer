name: Build and push trainer image

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_LC=$(basename "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "tags=ghcr.io/${OWNER_LC}/${REPO_LC}:latest,ghcr.io/${OWNER_LC}/${REPO_LC}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "image_url=ghcr.io/${OWNER_LC}/${REPO_LC}:latest" >> "$GITHUB_OUTPUT"
          echo "image=${OWNER_LC}/${REPO_LC}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Echo image
        run: |
          echo "::notice title=Image ready::${{ steps.meta.outputs.image_url }}"
          echo "Final image: ${{ steps.meta.outputs.image_url }}"
